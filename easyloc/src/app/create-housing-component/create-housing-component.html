<section class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-xl bg-white dark:bg-gray-800 p-6 rounded-lg shadow">

    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">
      Create New Location
    </h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

      <!-- Title -->
      <input
        type="text"
        formControlName="title"
        placeholder="Title"
        class="w-full p-3 rounded border dark:bg-gray-700 dark:text-white"
      />

      <!-- Description -->
      <textarea
        formControlName="description"
        placeholder="Description"
        class="w-full p-3 rounded border dark:bg-gray-700 dark:text-white"
      ></textarea>

      <!-- Property Type -->
      <input
        type="text"
        formControlName="property_type"
        placeholder="Property type (apartment, house...)"
        class="w-full p-3 rounded border dark:bg-gray-700 dark:text-white"
      />

      <!-- Location -->
      <input
        type="text"
        formControlName="location"
        placeholder="Location"
        class="w-full p-3 rounded border dark:bg-gray-700 dark:text-white"
      />

      <!-- Price -->
      <input
        type="number"
        formControlName="price_per_night"
        placeholder="Price per night"
        class="w-full p-3 rounded border dark:bg-gray-700 dark:text-white"
      />

      <!-- Available -->
      <label class="flex items-center gap-2 text-gray-700 dark:text-white">
        <input type="checkbox" formControlName="available">
        Available
      </label>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg"
      >
        {{ isLoading ? 'Creating...' : 'Create Location' }}
      </button>

    </form>

  </div>

</section>
