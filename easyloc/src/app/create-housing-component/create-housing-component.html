<section class="create-page">
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <div class="create-layout">

    <div class="form-card">
      <div class="form-head">
        <h2>Creer une nouvelle location</h2>
        <p>Renseignez l'essentiel pour publier votre logement.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="housing-form">
        <div class="field-group">
          <label for="title">Titre</label>
          <input
            id="title"
            type="text"
            formControlName="title"
            placeholder="Appartement proche du centre-ville"
          />
        </div>

        <div class="field-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            formControlName="description"
            rows="4"
            placeholder="Qu'est-ce qui rend ce logement special ?"
          ></textarea>
        </div>

        <div class="row two-cols">
          <div class="field-group">
            <label for="property_type">Type de logement</label>
            <select
              id="property_type"
              formControlName="property_type"
              class="property-select"
            >
              <option value="" disabled selected>Choisir un type...</option>
              <option value="maison">Maison</option>
              <option value="appartement">Appartement</option>
              <option value="studio">Studio</option>
              <option value="villa">Villa</option>
            </select>
          </div>

          <div class="field-group">
            <label for="location">Ville</label>
            <input
              id="location"
              type="text"
              formControlName="location"
              placeholder="Paris, Lyon, Marseille..."
            />
          </div>
        </div>

        <div class="row two-cols align-end">
          <div class="field-group">
            <label for="price_per_night">Prix par nuit</label>
            <input
              id="price_per_night"
              type="number"
              formControlName="price_per_night"
              placeholder="120"
            />
          </div>

          <label class="availability-toggle" for="available">
            <input id="available" type="checkbox" formControlName="available" />
            <span>Disponible a la reservation</span>
          </label>
        </div>

        <button type="submit" [disabled]="isLoading" class="submit-btn">
          {{ isLoading ? 'Creation...' : 'Creer la location' }}
        </button>
      </form>
    </div>
  </div>
</section>
