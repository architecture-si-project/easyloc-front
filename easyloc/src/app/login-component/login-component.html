<section class="bg-gray-50 dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">

    <!-- Logo (no href="#") -->
    <div class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white">
      <svg class="w-8 h-8 mr-2 fill-blue-500"></svg>
      EasyLock
    </div>

    <div class="w-full bg-white rounded-lg shadow dark:border sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
      <div class="p-6 space-y-4 sm:p-8">

        <h1 class="text-xl font-bold text-gray-900 md:text-2xl dark:text-white">
          Connectez-vous !!!
        </h1>

        <!-- ✅ Angular form -->
        <form
          [formGroup]="loginForm"
          (ngSubmit)="login()"
          class="space-y-4"
        >

          <!-- Email -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
              Votre mail
            </label>

            <input
              type="email"
              formControlName="email"
              placeholder="name@company.com"
              class="bg-gray-50 border border-gray-300 rounded-lg block w-full p-2.5 dark:bg-gray-700 dark:text-white"
            />

            @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
              <p class="text-red-500 text-sm">Email invalide</p>
            }
          </div>

          
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
              Mot de passe
            </label>

            <input
              type="password"
              formControlName="password"
              placeholder="••••••••"
              class="bg-gray-50 border border-gray-300 rounded-lg block w-full p-2.5 dark:bg-gray-700 dark:text-white"
            />

            @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
              <p class="text-red-500 text-sm">Mot de passe requis</p>
            }
          </div>

          
          <div class="flex items-center justify-between">
            <label class="flex items-center text-sm text-gray-500 dark:text-gray-300">
              <input type="checkbox" class="mr-2">
              Se souvenir de moi
            </label>

            
            <a class="text-sm text-blue-600 hover:underline">
              Mot de passe oublié ?
            </a>
          </div>

          
          <button
            type="submit"
            class="w-full text-white bg-blue-600 hover:bg-blue-700 rounded-lg text-sm px-5 py-2.5"
          >
            Se connecter
          </button>

        </form>

        
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Pas de compte ?
          <a routerLink="/signup" class="text-blue-600 hover:underline">
            S'inscrire
          </a>
        </p>

      </div>
    </div>
  </div>
</section>
